name: NFL EPA experiment
# Research experiment: does play-by-play EPA / QB-EPA beat the team-Elo model out-of-sample?
# Auto-runs when experiments/RUN.txt changes; commits its VERDICT back to the repo so it can
# be read without opening the Actions UI. Touches no production model.
on:
  workflow_dispatch: {}
  push:
    paths: ['experiments/RUN.txt']
permissions:
  contents: write
jobs:
  experiment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install pandas numpy pyarrow
      - name: selftest gate
        run: python nfl_epa_experiment.py --selftest
      - name: run experiment -> verdict file
        run: |
          mkdir -p experiments
          set -o pipefail
          python nfl_epa_experiment.py 2>&1 | tee experiments/NFL-EPA-VERDICT.md || true
      - name: commit verdict
        if: always()
        run: |
          git config user.name nfl-bot
          git config user.email actions@github.com
          git add experiments/NFL-EPA-VERDICT.md || true
          if git diff --cached --quiet; then echo "no verdict change"; exit 0; fi
          git commit -m "NFL EPA experiment verdict $(date -u +%F)"
          for i in 1 2 3 4 5; do git pull --rebase --autostash origin main && git push && { echo pushed; exit 0; }; sleep 3; done
